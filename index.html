<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Workstation</title>

<style>
body{
  margin:0;
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  font-family:system-ui;
  background:#0b1220;
}

/* SIMPLE GLOW */
.bg{
  position:absolute;
  width:300px;
  height:300px;
  background:#3b82f6;
  filter:blur(80px);
  opacity:0.2;
  top:-80px;
  left:-80px;
}

/* APP */
.app{
  width:360px;
  height:620px;
  background:#111827;
  border-radius:18px;
  display:flex;
  flex-direction:column;
  overflow:hidden;
  border:1px solid rgba(255,255,255,0.08);
}

/* HEADER */
.header{
  padding:14px;
  text-align:center;
  color:white;
  background:#1f2937;
  font-weight:600;
}

/* CHAT */
.chat{
  flex:1;
  padding:10px;
  overflow:auto;
  display:flex;
  flex-direction:column;
  gap:8px;
}

/* MSG */
.msg{
  display:flex;
}

.user{
  justify-content:flex-end;
}

.ai{
  justify-content:flex-start;
}

/* BUBBLE */
.bubble{
  max-width:75%;
  padding:9px 11px;
  font-size:14px;
  border-radius:12px;
  transition:0.15s;
}

/* USER */
.user .bubble{
  background:#3b82f6;
  color:white;
}

/* AI */
.ai .bubble{
  background:#1f2937;
  color:white;
}

/* INPUT */
.input{
  display:flex;
  padding:10px;
  background:#1f2937;
  gap:8px;
}

input{
  flex:1;
  padding:10px;
  border:none;
  border-radius:10px;
  outline:none;
  background:#0b1220;
  color:white;
}

button{
  padding:10px 14px;
  border:none;
  border-radius:10px;
  background:#3b82f6;
  color:white;
  cursor:pointer;
}
</style>

</head>

<body>

<div class="bg"></div>

<div class="app">

  <div class="header">AI Workstation</div>

  <div id="chat" class="chat"></div>

  <div class="input">
    <input id="msg" placeholder="Tulis pesan...">
    <button onclick="send()">Kirim</button>
  </div>

</div>

<script>

function add(text,type){
  const chat=document.getElementById("chat");

  const row=document.createElement("div");
  row.className="msg "+type;

  const bubble=document.createElement("div");
  bubble.className="bubble";
  bubble.innerText=text;

  row.appendChild(bubble);
  chat.appendChild(row);

  chat.scrollTop=chat.scrollHeight;
}

function reply(t){
  if(t.includes("halo")){
    return "Halo 👋 siap bantu kamu";
  }
  return "Oke 👍 aku menerima pesanmu";
}

function send(){
  const input=document.getElementById("msg");
  const text=input.value;
  if(!text) return;

  add(text,"user");
  input.value="";

  setTimeout(()=>{
    add(reply(text.toLowerCase()),"ai");
  },400);
}

</script>

</body>
</html>
