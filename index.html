<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Workstation</title>

<style>
body{
  margin:0;
  font-family: system-ui, Arial;
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  background: radial-gradient(circle at top,#0f172a,#020617);
  overflow:hidden;
}

/* glow background */
body::before{
  content:"";
  position:absolute;
  width:400px;
  height:400px;
  background:#3b82f6;
  filter:blur(120px);
  top:-100px;
  left:-100px;
  opacity:0.4;
}

body::after{
  content:"";
  position:absolute;
  width:400px;
  height:400px;
  background:#8b5cf6;
  filter:blur(120px);
  bottom:-120px;
  right:-120px;
  opacity:0.4;
}

/* APP */
.app{
  width:370px;
  height:650px;
  background:rgba(255,255,255,0.06);
  backdrop-filter: blur(20px);
  border:1px solid rgba(255,255,255,0.1);
  border-radius:22px;
  display:flex;
  flex-direction:column;
  overflow:hidden;
  box-shadow:0 20px 60px rgba(0,0,0,0.6);
}

/* HEADER */
.header{
  padding:14px;
  text-align:center;
  font-weight:600;
  color:white;
  background:rgba(255,255,255,0.05);
  border-bottom:1px solid rgba(255,255,255,0.1);
}

/* CHAT */
.chat{
  flex:1;
  padding:12px;
  overflow-y:auto;
  display:flex;
  flex-direction:column;
  gap:10px;
}

/* MESSAGE */
.msg{
  display:flex;
}

/* USER */
.user{
  justify-content:flex-end;
}

.user .bubble{
  background:linear-gradient(135deg,#3b82f6,#6366f1);
  color:white;
  border-radius:16px 16px 4px 16px;
}

/* AI */
.ai{
  justify-content:flex-start;
}

.ai .bubble{
  background:rgba(255,255,255,0.08);
  color:white;
  border-radius:16px 16px 16px 4px;
  border:1px solid rgba(255,255,255,0.1);
}

/* bubble */
.bubble{
  max-width:75%;
  padding:10px 12px;
  font-size:14px;
  line-height:1.4;
  backdrop-filter: blur(10px);
}

/* typing */
.typing{
  font-size:12px;
  color:#a5b4fc;
  padding:6px 12px;
  height:18px;
}

/* input */
.input{
  display:flex;
  padding:10px;
  gap:8px;
  background:rgba(255,255,255,0.05);
  border-top:1px solid rgba(255,255,255,0.1);
}

input{
  flex:1;
  padding:10px;
  border:none;
  border-radius:12px;
  outline:none;
  background:rgba(0,0,0,0.3);
  color:white;
}

button{
  padding:10px 14px;
  border:none;
  border-radius:12px;
  background:linear-gradient(135deg,#3b82f6,#8b5cf6);
  color:white;
  cursor:pointer;
  font-weight:500;
}
</style>

</head>

<body>

<div class="app">

  <div class="header">⚡ AI Workstation Pro</div>

  <div id="chat" class="chat"></div>

  <div id="typing" class="typing"></div>

  <div class="input">
    <input id="msg" placeholder="Tulis pesan...">
    <button onclick="send()">Kirim</button>
  </div>

</div>

<script>

function add(text,type){
  const chat=document.getElementById("chat");

  const row=document.createElement("div");
  row.className="msg "+type;

  const bubble=document.createElement("div");
  bubble.className="bubble";
  bubble.innerText=text;

  row.appendChild(bubble);
  chat.appendChild(row);

  chat.scrollTop=chat.scrollHeight;
}

function reply(t){
  if(t.includes("halo") || t.includes("hi")){
    return "Halo 👋 Aku AI Workstation Pro siap membantu kamu.";
  }
  if(t.includes("siapa")){
    return "Aku adalah AI futuristik versi demo ⚡";
  }
  if(t.includes("harga")){
    return "Aku bisa bantu cari info itu, coba jelaskan lebih detail 👍";
  }
  return "Menarik ⚡ aku masih versi demo, nanti bisa upgrade ke AI beneran.";
}

function send(){
  const input=document.getElementById("msg");
  const text=input.value;
  if(!text) return;

  add(text,"user");
  input.value="";

  const typing=document.getElementById("typing");
  typing.innerText="AI thinking...";

  setTimeout(()=>{
    typing.innerText="";
    add(reply(text.toLowerCase()),"ai");
  },800);
}

</script>

</body>
</html>
