<!DOCTYPE html>
<html>
<head>
  <title>AI Workstation</title>
</head>
<body>

<h2>AI Workstation OK</h2>

<input id="msg" placeholder="tulis...">
<button onclick="send()">kirim</button>

<p id="out"></p>

<script>
function send(){
  const msg=document.getElementById("msg").value;
  document.getElementById("out").innerText="Kamu: "+msg;
}
</script>

</body>
</html>
