<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Neon AI Core</title>

<style>
body{
  margin:0;
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  background:#000;
  font-family:system-ui;
}

.glow1,.glow2{
  position:absolute;
  width:220px;
  height:220px;
  filter:blur(80px);
  opacity:0.2;
}
.glow1{background:#00e5ff;top:-70px;left:-70px;}
.glow2{background:#00ff88;bottom:-70px;right:-70px;}

.app{
  width:360px;
  height:620px;
  background:#0a0a0a;
  border-radius:18px;
  display:flex;
  flex-direction:column;
  overflow:hidden;
  border:1px solid rgba(0,229,255,0.15);
}

.header{
  padding:14px;
  text-align:center;
  color:#00e5ff;
  background:#0d0d0d;
  border-bottom:1px solid rgba(0,229,255,0.15);
}

.chat{
  flex:1;
  padding:10px;
  overflow:auto;
  display:flex;
  flex-direction:column;
  gap:8px;
}

.msg{display:flex;}
.user{justify-content:flex-end;}
.ai{justify-content:flex-start;}

.bubble{
  max-width:75%;
  padding:10px 12px;
  border-radius:12px;
  font-size:14px;
}

.user .bubble{
  color:#00e5ff;
  background:rgba(0,229,255,0.08);
  border:1px solid rgba(0,229,255,0.2);
}

.ai .bubble{
  color:#00ff88;
  background:rgba(0,255,136,0.06);
  border:1px solid rgba(0,255,136,0.2);
}

.input{
  display:flex;
  padding:10px;
  background:#0d0d0d;
  gap:8px;
}

input{
  flex:1;
  padding:10px;
  border:none;
  border-radius:10px;
  outline:none;
  background:#000;
  color:#00e5ff;
  border:1px solid rgba(0,229,255,0.2);
}

button{
  padding:10px 14px;
  border:none;
  border-radius:10px;
  background:linear-gradient(135deg,#00e5ff,#00ff88);
  cursor:pointer;
  font-weight:600;
}
</style>

</head>

<body>

<div class="glow1"></div>
<div class="glow2"></div>

<div class="app">

  <div class="header">⚡ NEON AI CORE</div>

  <div id="chat" class="chat"></div>

  <div class="input">
    <input id="msg" placeholder="Tulis pesan...">
    <button id="sendBtn">Kirim</button>
  </div>

</div>

<script>

document.addEventListener("DOMContentLoaded", function(){

  const chat = document.getElementById("chat");
  const input = document.getElementById("msg");
  const btn = document.getElementById("sendBtn");

  function add(text,type){
    const row=document.createElement("div");
    row.className="msg "+type;

    const bubble=document.createElement("div");
    bubble.className="bubble";
    bubble.innerText=text;

    row.appendChild(bubble);
    chat.appendChild(row);

    chat.scrollTop=chat.scrollHeight;
  }

  function reply(t){
    if(t.includes("halo")) return "⚡ Halo dari Neon AI Core";
    if(t.includes("siapa")) return "Saya AI prototype siap upgrade 🤖";
    return "✔ pesan diterima";
  }

  function send(){
    const text = input.value.trim();
    if(!text) return;

    add(text,"user");
    input.value="";

    setTimeout(()=>{
      add(reply(text.toLowerCase()),"ai");
    },300);
  }

  btn.addEventListener("click",send);

  input.addEventListener("keypress", function(e){
    if(e.key === "Enter") send();
  });

});
</script>

</body>
</html>
