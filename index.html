<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Workstation</title>

<style>
body{
  margin:0;
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  background:#000;
  font-family:system-ui;
}

.app{
  width:360px;
  height:600px;
  background:#0a0a0a;
  display:flex;
  flex-direction:column;
  border-radius:15px;
  overflow:hidden;
  border:1px solid #00e5ff33;
}

.header{
  padding:12px;
  text-align:center;
  color:#00e5ff;
  background:#111;
}

.chat{
  flex:1;
  padding:10px;
  overflow:auto;
}

.msg{margin:8px 0;}
.user{color:#00e5ff;text-align:right;}
.ai{color:#00ff88;text-align:left;}

.input{
  display:flex;
  padding:10px;
  background:#111;
}

input{
  flex:1;
  padding:10px;
  background:#000;
  border:1px solid #00e5ff33;
  color:#00e5ff;
  outline:none;
}

button{
  margin-left:8px;
  padding:10px;
  background:#00e5ff;
  border:none;
  cursor:pointer;
}
</style>

</head>

<body>

<div class="app">

  <div class="header">NEON AI</div>

  <div id="chat" class="chat"></div>

  <div class="input">
    <input id="msg" placeholder="Tulis pesan...">
    <button onclick="send()">Kirim</button>
  </div>

</div>

<script>

const chat = document.getElementById("chat");
const input = document.getElementById("msg");

function add(text,type){
  const div=document.createElement("div");
  div.className="msg "+type;
  div.innerText=text;
  chat.appendChild(div);
  chat.scrollTop=chat.scrollHeight;
}

function send(){
  const text=input.value.trim();
  if(!text) return;

  add("Kamu: "+text,"user");
  input.value="";

  setTimeout(()=>{
    add("AI: "+text,"ai");
  },300);
}

</script>

</body>
</html>
