<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>AI Workstation</title>

<style>
body{
  margin:0;
  font-family: Arial;
  background:#0b1220;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}

.container{
  width:360px;
  height:600px;
  background:#111827;
  border-radius:16px;
  display:flex;
  flex-direction:column;
  overflow:hidden;
  box-shadow:0 10px 30px rgba(0,0,0,0.4);
}

.header{
  padding:15px;
  background:#1f2937;
  color:white;
  font-weight:bold;
  text-align:center;
}

.chat{
  flex:1;
  padding:10px;
  overflow-y:auto;
}

.msg{
  margin:8px 0;
  display:flex;
}

.user{
  justify-content:flex-end;
}

.ai{
  justify-content:flex-start;
}

.bubble{
  max-width:70%;
  padding:10px;
  border-radius:12px;
  font-size:14px;
}

.user .bubble{
  background:#3b82f6;
  color:white;
  border-bottom-right-radius:0;
}

.ai .bubble{
  background:#374151;
  color:white;
  border-bottom-left-radius:0;
}

.typing{
  font-size:12px;
  color:#9ca3af;
  padding-left:10px;
}

.input-area{
  display:flex;
  padding:10px;
  background:#1f2937;
}

input{
  flex:1;
  padding:10px;
  border:none;
  border-radius:8px;
  outline:none;
}

button{
  margin-left:8px;
  padding:10px;
  border:none;
  border-radius:8px;
  background:#3b82f6;
  color:white;
  cursor:pointer;
}
</style>

</head>

<body>

<div class="container">

  <div class="header">AI Workstation</div>

  <div id="chat" class="chat"></div>

  <div id="typing" class="typing"></div>

  <div class="input-area">
    <input id="msg" placeholder="Tulis pesan...">
    <button onclick="send()">Kirim</button>
  </div>

</div>

<script>
function addMessage(text, type){
  const chat = document.getElementById("chat");

  const wrap = document.createElement("div");
  wrap.className = "msg " + type;

  const bubble = document.createElement("div");
  bubble.className = "bubble";
  bubble.innerText = text;

  wrap.appendChild(bubble);
  chat.appendChild(wrap);

  chat.scrollTop = chat.scrollHeight;
}

function send(){
  const input = document.getElementById("msg");
  const text = input.value;
  if(!text) return;

  addMessage(text, "user");
  input.value = "";

  const typing = document.getElementById("typing");
  typing.innerText = "AI sedang mengetik...";

  setTimeout(()=>{
    typing.innerText = "";
    addMessage(getReply(text.toLowerCase()), "ai");
  }, 800);
}

function getReply(t){
  if(t.includes("hi") || t.includes("halo")){
    return "Halo 👋 aku AI Workstation!";
  }
  if(t.includes("siapa")){
    return "Aku adalah AI sederhana yang sedang kamu upgrade 🚀";
  }
  if(t.includes("harga")){
    return "Aku bisa bantu cari info harga, coba jelaskan detailnya 👍";
  }
  return "Menarik 👍 aku masih belajar, lanjutkan pertanyaannya ya";
}
</script>

</body>
</html>
