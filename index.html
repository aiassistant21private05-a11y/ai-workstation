<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Workstation Cyber</title>

<style>
body{
  margin:0;
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  font-family:system-ui;
  background:#050816;
  overflow:hidden;
}

/* NEON BACKGROUND */
body::before{
  content:"";
  position:absolute;
  width:500px;
  height:500px;
  background:#4f46e5;
  filter:blur(140px);
  top:-120px;
  left:-120px;
  opacity:0.5;
  animation:float 6s ease-in-out infinite;
}

body::after{
  content:"";
  position:absolute;
  width:500px;
  height:500px;
  background:#06b6d4;
  filter:blur(140px);
  bottom:-150px;
  right:-150px;
  opacity:0.4;
  animation:float 8s ease-in-out infinite;
}

@keyframes float{
  0%,100%{transform:translateY(0px)}
  50%{transform:translateY(30px)}
}

/* MAIN CARD */
.app{
  width:380px;
  height:650px;
  background:rgba(255,255,255,0.06);
  backdrop-filter: blur(25px);
  border:1px solid rgba(255,255,255,0.15);
  border-radius:24px;
  display:flex;
  flex-direction:column;
  overflow:hidden;

  box-shadow:
  0 0 20px rgba(99,102,241,0.4),
  0 0 60px rgba(6,182,212,0.2),
  0 30px 80px rgba(0,0,0,0.8);

  transform: perspective(900px) rotateX(2deg);
}

/* HEADER */
.header{
  padding:14px;
  text-align:center;
  color:white;
  font-weight:600;
  letter-spacing:1px;
  background:rgba(255,255,255,0.05);
  border-bottom:1px solid rgba(255,255,255,0.1);
}

/* CHAT */
.chat{
  flex:1;
  padding:12px;
  overflow-y:auto;
  display:flex;
  flex-direction:column;
  gap:10px;
}

/* MESSAGE */
.msg{
  display:flex;
}

/* USER */
.user{
  justify-content:flex-end;
}

.user .bubble{
  background:linear-gradient(135deg,#6366f1,#3b82f6);
  color:white;
  border-radius:18px 18px 4px 18px;
  box-shadow:0 0 15px rgba(99,102,241,0.4);
}

/* AI */
.ai{
  justify-content:flex-start;
}

.ai .bubble{
  background:rgba(255,255,255,0.08);
  color:white;
  border-radius:18px 18px 18px 4px;
  border:1px solid rgba(255,255,255,0.15);
  box-shadow:0 0 15px rgba(6,182,212,0.15);
}

/* BUBBLE */
.bubble{
  max-width:75%;
  padding:10px 12px;
  font-size:14px;
  line-height:1.4;
  backdrop-filter: blur(10px);
  transform: translateZ(0);
}

/* TYPING */
.typing{
  font-size:12px;
  color:#67e8f9;
  padding:6px 12px;
  height:18px;
}

/* INPUT */
.input{
  display:flex;
  padding:10px;
  gap:8px;
  background:rgba(255,255,255,0.05);
  border-top:1px solid rgba(255,255,255,0.1);
}

input{
  flex:1;
  padding:10px;
  border:none;
  border-radius:12px;
  outline:none;
  background:rgba(0,0,0,0.4);
  color:white;
}

button{
  padding:10px 14px;
  border:none;
  border-radius:12px;
  background:linear-gradient(135deg,#06b6d4,#6366f1);
  color:white;
  cursor:pointer;
  font-weight:600;
  box-shadow:0 0 15px rgba(6,182,212,0.3);
}
</style>

</head>

<body>

<div class="app">

  <div class="header">⚡ AI WORKSTATION / CYBER CORE</div>

  <div id="chat" class="chat"></div>

  <div id="typing" class="typing"></div>

  <div class="input">
    <input id="msg" placeholder="Tulis pesan...">
    <button onclick="send()">Kirim</button>
  </div>

</div>

<script>

function add(text,type){
  const chat=document.getElementById("chat");

  const row=document.createElement("div");
  row.className="msg "+type;

  const bubble=document.createElement("div");
  bubble.className="bubble";
  bubble.innerText=text;

  row.appendChild(bubble);
  chat.appendChild(row);

  chat.scrollTop=chat.scrollHeight;
}

function reply(t){
  if(t.includes("halo")||t.includes("hi")){
    return "⚡ Halo, saya AI Cyber Core siap membantu kamu.";
  }
  if(t.includes("siapa")){
    return "Saya AI futuristik generasi prototype 🚀";
  }
  if(t.includes("harga")){
    return "Saya bisa bantu analisis data harga ⚡";
  }
  return "Data belum lengkap ⚡ tapi saya terus belajar...";
}

function send(){
  const input=document.getElementById("msg");
  const text=input.value;
  if(!text) return;

  add(text,"user");
  input.value="";

  const typing=document.getElementById("typing");
  typing.innerText="AI processing...";

  setTimeout(()=>{
    typing.innerText="";
    add(reply(text.toLowerCase()),"ai");
  },900);
}

</script>

</body>
</html>
