<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Workstation</title>

<style>
body{
  margin:0;
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  background:#000;
  font-family:system-ui;
}

/* soft neon glow */
.glow{
  position:absolute;
  width:260px;
  height:260px;
  background:#00e5ff;
  filter:blur(90px);
  opacity:0.15;
  top:-80px;
  left:-80px;
}

.app{
  width:360px;
  height:620px;
  background:#0a0a0a;
  border-radius:20px;
  display:flex;
  flex-direction:column;
  overflow:hidden;
  border:1px solid rgba(0,229,255,0.2);
  box-shadow:0 0 25px rgba(0,229,255,0.08);
}

/* HEADER */
.header{
  padding:14px;
  text-align:center;
  color:#00e5ff;
  background:#0f0f0f;
  border-bottom:1px solid rgba(0,229,255,0.15);
  font-weight:600;
  letter-spacing:0.5px;
}

/* CHAT */
.chat{
  flex:1;
  padding:12px;
  overflow:auto;
  display:flex;
  flex-direction:column;
  gap:10px;
}

/* MESSAGE */
.msg{
  display:flex;
}

.user{
  justify-content:flex-end;
}

.ai{
  justify-content:flex-start;
}

/* BUBBLE */
.bubble{
  max-width:75%;
  padding:10px 12px;
  font-size:14px;
  border-radius:14px;
  line-height:1.4;
  animation:pop 0.2s ease;
}

/* user = neon blue solid style */
.user .bubble{
  background:rgba(0,229,255,0.08);
  color:#00e5ff;
  border:1px solid rgba(0,229,255,0.25);
}

/* ai = same style biar clean (no green lagi) */
.ai .bubble{
  background:rgba(0,229,255,0.05);
  color:#bfefff;
  border:1px solid rgba(0,229,255,0.15);
}

@keyframes pop{
  from{transform:scale(0.95);opacity:0}
  to{transform:scale(1);opacity:1}
}

/* INPUT */
.input{
  display:flex;
  padding:10px;
  gap:8px;
  background:#0f0f0f;
  border-top:1px solid rgba(0,229,255,0.12);
}

input{
  flex:1;
  padding:10px;
  border:none;
  border-radius:12px;
  outline:none;
  background:#000;
  color:#00e5ff;
  border:1px solid rgba(0,229,255,0.2);
}

button{
  padding:10px 14px;
  border:none;
  border-radius:12px;
  background:#00e5ff;
  color:#000;
  font-weight:600;
  cursor:pointer;
}
</style>

</head>

<body>

<div class="glow"></div>

<div class="app">

  <div class="header">⚡ NEON AI WORKSTATION</div>

  <div id="chat" class="chat"></div>

  <div class="input">
    <input id="msg" placeholder="Tulis pesan...">
    <button onclick="send()">Kirim</button>
  </div>

</div>

<script>

const chat=document.getElementById("chat");
const input=document.getElementById("msg");

function add(text,type){
  const row=document.createElement("div");
  row.className="msg "+type;

  const bubble=document.createElement("div");
  bubble.className="bubble";
  bubble.innerText=text;

  row.appendChild(bubble);
  chat.appendChild(row);

  chat.scrollTop=chat.scrollHeight;
}

function send(){
  const text=input.value.trim();
  if(!text) return;

  add(text,"user");
  input.value="";

  setTimeout(()=>{
    add("AI: "+text,"ai");
  },300);
}

</script>

</body>
</html>
