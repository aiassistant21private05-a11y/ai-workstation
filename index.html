<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <title>AI Workstation</title>
  <style>
    body {
      font-family: Arial;
      background: #0f172a;
      color: white;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .box {
      width: 320px;
      background: #1e293b;
      padding: 20px;
      border-radius: 12px;
    }

    #chat {
      height: 200px;
      overflow-y: auto;
      background: #0b1220;
      padding: 10px;
      margin-bottom: 10px;
      border-radius: 8px;
      font-size: 14px;
    }

    input {
      width: 70%;
      padding: 8px;
    }

    button {
      padding: 8px;
      cursor: pointer;
    }
  </style>
</head>
<body>

<div class="box">
  <h3>AI Workstation</h3>

  <div id="chat"></div>

  <input id="msg" placeholder="Tulis pesan">
  <button onclick="send()">Kirim</button>
</div>

<script>
function send() {
  const input = document.getElementById("msg");
  const chat = document.getElementById("chat");

  const userText = input.value;
  if (!userText) return;

  chat.innerHTML += "<div><b>Kamu:</b> " + userText + "</div>";

  let reply = getAIResponse(userText.toLowerCase());

  setTimeout(() => {
    chat.innerHTML += "<div><b>AI:</b> " + reply + "</div>";
    chat.scrollTop = chat.scrollHeight;
  }, 500);

  input.value = "";
}

function getAIResponse(text) {
  if (text.includes("hi") || text.includes("halo")) {
    return "Halo 👋 aku AI Workstation, ada yang bisa aku bantu?";
  }
  if (text.includes("harga")) {
    return "Aku bisa bantu cari informasi harga, coba jelaskan lebih detail ya 👍";
  }
  if (text.includes("siapa")) {
    return "Aku adalah AI sederhana yang sedang kamu kembangkan 🤖";
  }
  return "Menarik 👍 aku masih belajar, coba tanya hal lain ya";
}
</script>

</body>
</html>
