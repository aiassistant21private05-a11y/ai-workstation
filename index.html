<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Workstation Neon</title>

<style>
body{
  margin:0;
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  font-family:system-ui;
  background:#000000;
  overflow:hidden;
}

/* NEON GLOW (LIGHT) */
.glow1{
  position:absolute;
  width:250px;
  height:250px;
  background:#00e5ff;
  filter:blur(70px);
  opacity:0.25;
  top:-60px;
  left:-60px;
}

.glow2{
  position:absolute;
  width:250px;
  height:250px;
  background:#00ff88;
  filter:blur(80px);
  opacity:0.2;
  bottom:-80px;
  right:-80px;
}

/* APP */
.app{
  width:360px;
  height:620px;
  background:#0a0a0a;
  border-radius:18px;
  display:flex;
  flex-direction:column;
  overflow:hidden;
  border:1px solid rgba(0,255,255,0.15);
}

/* HEADER */
.header{
  padding:14px;
  text-align:center;
  color:#00e5ff;
  background:#0f0f0f;
  font-weight:600;
  border-bottom:1px solid rgba(0,255,255,0.15);
}

/* CHAT */
.chat{
  flex:1;
  padding:10px;
  overflow:auto;
  display:flex;
  flex-direction:column;
  gap:8px;
}

/* MSG */
.msg{
  display:flex;
}

.user{
  justify-content:flex-end;
}

.ai{
  justify-content:flex-start;
}

/* BUBBLE */
.bubble{
  max-width:75%;
  padding:9px 11px;
  font-size:14px;
  border-radius:12px;
}

/* USER NEON BLUE */
.user .bubble{
  background:#001f2f;
  color:#00e5ff;
  border:1px solid rgba(0,229,255,0.3);
}

/* AI NEON GREEN */
.ai .bubble{
  background:#001a10;
  color:#00ff88;
  border:1px solid rgba(0,255,136,0.25);
}

/* INPUT */
.input{
  display:flex;
  padding:10px;
  background:#0f0f0f;
  gap:8px;
  border-top:1px solid rgba(0,255,255,0.15);
}

input{
  flex:1;
  padding:10px;
  border:none;
  border-radius:10px;
  outline:none;
  background:#000;
  color:#00e5ff;
  border:1px solid rgba(0,229,255,0.2);
}

button{
  padding:10px 14px;
  border:none;
  border-radius:10px;
  background:linear-gradient(135deg,#00e5ff,#00ff88);
  color:#000;
  font-weight:600;
  cursor:pointer;
}
</style>

</head>

<body>

<div class="glow1"></div>
<div class="glow2"></div>

<div class="app">

  <div class="header">⚡ NEON AI WORKSTATION</div>

  <div id="chat" class="chat"></div>

  <div class="input">
    <input id="msg" placeholder="Tulis pesan...">
    <button onclick="send()">Kirim</button>
  </div>

</div>

<script>

function add(text,type){
  const chat=document.getElementById("chat");

  const row=document.createElement("div");
  row.className="msg "+type;

  const bubble=document.createElement("div");
  bubble.className="bubble";
  bubble.innerText=text;

  row.appendChild(bubble);
  chat.appendChild(row);

  chat.scrollTop=chat.scrollHeight;
}

function reply(t){
  if(t.includes("halo")){
    return "⚡ Halo dari Neon AI System";
  }
  if(t.includes("siapa")){
    return "Saya AI neon prototype 💡";
  }
  return "✔ pesan diterima, sistem aktif";
}

function send(){
  const input=document.getElementById("msg");
  const text=input.value;
  if(!text) return;

  add(text,"user");
  input.value="";

  setTimeout(()=>{
    add(reply(text.toLowerCase()),"ai");
  },400);
}

</script>

</body>
</html>
